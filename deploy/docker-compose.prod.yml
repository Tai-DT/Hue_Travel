# ============================================
# Huế Travel — Production Docker Compose
# ============================================

version: '3.9'

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hue_travel}
      POSTGRES_USER: ${POSTGRES_USER:-huetravel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-huetravel}']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - huetravel

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - huetravel

  # ---- MinIO (S3) ----
  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-huetravel}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - huetravel

  # ---- Meilisearch ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: always
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - huetravel

  # ---- API ----
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    restart: always
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-huetravel}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-hue_travel}?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-huetravel}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: hue-travel
      MINO_USE_SSL: "false"
      MEILISEARCH_URL: http://meilisearch:7700
      MEILISEARCH_MASTER_KEY: ${MEILISEARCH_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      ESMS_API_KEY: ${ESMS_API_KEY}
      ESMS_SECRET_KEY: ${ESMS_SECRET_KEY}
      ESMS_BRAND_NAME: ${ESMS_BRAND_NAME:-HueTravel}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_HASH_SECRET: ${VNPAY_HASH_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - huetravel

  # ---- Web Admin ----
  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080/api/v1
    depends_on:
      - api
    networks:
      - huetravel

  # ---- Provider Portal ----
  provider-portal:
    build:
      context: ../apps/provider-portal
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8080/api/v1
    depends_on:
      - api
    networks:
      - huetravel

  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
      - provider-portal
    networks:
      - huetravel

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:

networks:
  huetravel:
    driver: bridge
