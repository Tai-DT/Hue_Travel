name: Huế Travel CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # Backend: Go API
  # ============================================
  api-test:
    name: 🧪 API Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: apps/api/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint
        run: go vet ./...

      - name: Test
        run: go test ./... -v -race -count=1

      - name: Build
        run: go build -o bin/server ./cmd/server

  # ============================================
  # Web Admin: Next.js
  # ============================================
  web-build:
    name: 🌐 Web Admin Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

  # ============================================
  # Provider Portal: Next.js
  # ============================================
  provider-build:
    name: 🧭 Provider Portal Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/provider-portal

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/provider-portal/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build
        run: npm run build

  # ============================================
  # Docker: Build API Image
  # ============================================
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [api-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build API Docker image
        run: |
          docker build -t hue-travel-api:latest -f apps/api/Dockerfile apps/api

      - name: Build Web Docker image
        run: |
          docker build -t hue-travel-web:latest -f apps/web/Dockerfile apps/web || true

  # ============================================
  # Deploy (manual trigger for production)
  # ============================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [api-test, web-build, provider-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "🚀 Ready to deploy Huế Travel!"
          echo "API Tests: ✅"
          echo "Web Build: ✅"
          echo "Provider Build: ✅"
          echo ""
          echo "Deploy steps:"
          echo "1. docker compose -f deploy/docker-compose.prod.yml pull"
          echo "2. docker compose -f deploy/docker-compose.prod.yml up -d"
