# ============================================
# Huế Travel — Development Infrastructure
# ============================================
# Usage: docker compose up -d
# ============================================

services:
  # ---- PostgreSQL 16 with pgvector ----
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ht-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hue_travel
      POSTGRES_USER: huetravel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-huetravel_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/internal/migration/init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U huetravel -d hue_travel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis 7 (cache + queue + pub/sub) ----
  redis:
    image: redis:7-alpine
    container_name: ht-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- MinIO (S3-compatible object storage) ----
  minio:
    image: minio/minio:latest
    container_name: ht-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-huetravel}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-huetravel_minio_2026}
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Meilisearch (full-text search) ----
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: ht-meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-huetravel_meili_dev_key}
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meilisearch_data:
